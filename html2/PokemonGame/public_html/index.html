<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Pokémon</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h1>Batalha Pokémon</h1>
        </header>
        
        <div class="score-board">
            <div id="user-label" class="badge">Bruno</div>
            <div id="computer-label" class="badge">Nayara</div>
            <span id="user-score">0</span>:<span id="computer-score">0</span>
        </div>
        
        <div class="result">
            <p>Que comece a batalha!</p>
        </div>
        
        <div class="choices">
            <div class="choice" id="s">
                <img width="200" src="images/bulbasaur.png" alt="">
            </div>
            <div class="choice" id="p">
                <img width="200" src="images/squirtle.png" alt="">
            </div>
            <div class="choice" id="r">
                <img width="200"  src="images/charmander.png" alt="">
            </div>
        </div>
        
        <p id="action-message">Escolha seu pokémon.</p>
        <script src="logic.js" charset="utf-8"></script>
    </body>
</html>
